<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Book</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Order Book: <span id="symbol" th:text="${symbol}"></span></h1>
            <a th:href="@{/market}" style="text-decoration: none; border: 1px solid var(--border-color); color: var(--text-color); padding: 0.5rem 1rem; border-radius: 6px;">Back to Market</a>
        </header>
        <div class="orderbook-container">
            <div class="side bids">
                <h2>Bids (Buy)</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Price</th>
                            <th>Size</th>
                        </tr>
                    </thead>
                    <tbody id="bids-body">
                        <tr>
                            <td colspan="2" style="text-align: center; color: var(--text-muted);">Waiting for stream...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="side asks">
                <h2>Asks (Sell)</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Price</th>
                            <th>Size</th>
                        </tr>
                    </thead>
                    <tbody id="asks-body">
                        <tr>
                            <td colspan="2" style="text-align: center; color: var(--text-muted);">Waiting for stream...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script th:src="@{/app.js}"></script>
</body>
</html>
